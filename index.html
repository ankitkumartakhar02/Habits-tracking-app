
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF--8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DHabits Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-primary: 34 211 238; /* cyan-400 */
        --color-gradient-from: #a78bfa; /* violet-400 */
        --color-gradient-via: #38bdf8; /* cyan-400 */
        --color-gradient-to: #4ade80; /* emerald-400 */
        --color-accent: #22d3ee; /* cyan-500 */
        --color-accent-dark: #06b6d4; /* cyan-600 */
        --color-completed-from: rgba(22, 163, 74, 0.1); /* green-600/10 */
        --color-completed-to: rgba(5, 150, 105, 0.1); /* emerald-600/10 */
        --color-completed-ring: rgba(52, 211, 153, 0.5); /* emerald-400/50 */
      }
      body {
        font-family: 'Inter', sans-serif;
        overflow: hidden; /* Prevent scrollbars from background */
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes move-aurora {
        0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
        25% { transform: translate(-50%, -50%) rotate(90deg) scale(1.2); }
        50% { transform: translate(-50%, -50%) rotate(180deg) scale(1); }
        75% { transform: translate(-50%, -50%) rotate(270deg) scale(1.2); }
        100% { transform: translate(-50%, -50%) rotate(360deg) scale(1); }
      }

      .animate-slide-down {
        animation: slideDown 0.5s ease-out forwards;
      }

      .animate-fade-in {
          animation: fadeIn 0.5s ease-out forwards;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "recharts": "https://esm.sh/recharts@^3.5.1"
  }
}
</script>
</head>
  <body class="bg-slate-900 text-white">
    <div id="root"></div>
  </body>
</html>
