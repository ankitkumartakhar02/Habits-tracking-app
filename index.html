
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DHabits Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-primary: 34 211 238; /* cyan-400 */
        --color-gradient-from: #a78bfa; /* violet-400 */
        --color-gradient-via: #38bdf8; /* cyan-400 */
        --color-gradient-to: #4ade80; /* emerald-400 */
        --color-accent: #22d3ee; /* cyan-500 */
        --color-accent-dark: #06b6d4; /* cyan-600 */
        --color-completed-from: rgba(22, 163, 74, 0.1); /* green-600/10 */
        --color-completed-to: rgba(5, 150, 105, 0.1); /* emerald-600/10 */
        --color-completed-ring: rgba(52, 211, 153, 0.5); /* emerald-400/50 */
      }
      body {
        font-family: 'Inter', sans-serif;
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.5);
        }
        70% {
          opacity: 1;
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }
      
      @keyframes mesh-gradient {
        0% {
            background-position: 0% 50%;
        }
        50% {
            background-position: 100% 50%;
        }
        100% {
            background-position: 0% 50%;
        }
      }

      @keyframes pulse-ring {
        0% {
          box-shadow: 0 0 0 0px var(--color-completed-ring);
        }
        100% {
          box-shadow: 0 0 0 10px rgba(0, 0, 0, 0);
        }
      }

      @keyframes jump {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-25%); }
      }

      .animate-slide-down {
        animation: slideDown 0.5s ease-out forwards;
      }

      .animate-fade-in {
          animation: fadeIn 0.5s ease-out forwards;
      }
      .animate-pop-in {
          animation: popIn 0.3s ease-out forwards;
      }
      .animate-pulse-ring {
          animation: pulse-ring 0.6s ease-out;
      }
      .animate-jump {
          animation: jump 0.4s ease-in-out;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "recharts": "https://esm.sh/recharts@^3.5.1"
  }
}
</script>
</head>
  <body class="bg-gray-50 text-slate-800">
    <div id="root"></div>
  </body>
</html>
